<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGE VIP PREMIUM PANEL</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

    <style>
        :root {
            --bg-main: #0f172a; 
            --bg-body: #f8fafc;
            --accent: #d4af37; 
            --text-dark: #1e293b;
            --text-light: #64748b;
            --card-bg: #ffffff;
            --card-border: #e2e8f0;
            --success: #22c55e;
            --danger: #ef4444;
        }

        /* Dark Mode Styles */
        body.dark-mode {
            --bg-body: #020617;
            --text-dark: #f8fafc;
            --text-light: #94a3b8;
            --card-bg: #1e293b;
            --card-border: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; transition: background 0.3s, color 0.3s; }
        body { background: var(--bg-body); color: var(--text-dark); }

        /* Login */
        #loginSection { position: fixed; inset: 0; background: #0f172a; display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .login-card { background: white; padding: 40px; border-radius: 24px; width: 90%; max-width: 380px; text-align: center; color: #1e293b; }

        /* Header */
        .header { background: #0f172a; padding: 50px 20px; color: white; text-align: center; position: relative; border-bottom: 2px solid var(--accent); }
        .nav-icons { position: absolute; top: 15px; right: 20px; display: flex; gap: 10px; }
        .icon-btn { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 10px; border-radius: 12px; cursor: pointer; font-size: 16px; }

        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 600px; margin: 25px auto 0; }
        .stat-card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .stat-card h2 { font-size: 32px; color: var(--accent); }

        /* Search */
        .search-container { max-width: 600px; margin: -28px auto 0; padding: 0 15px; position: relative; z-index: 10; }
        .search-input { width: 100%; padding: 18px 18px 18px 50px; border-radius: 15px; border: none; box-shadow: 0 10px 15px rgba(0,0,0,0.1); font-weight: 600; outline: none; background: var(--card-bg); color: var(--text-dark); border: 1px solid var(--card-border); }

        /* User List */
        .container { max-width: 1200px; margin: 40px auto; padding: 25px; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        .user-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 20px; padding: 24px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }

        /* VIP Card Preview */
        .vip-membership-card { width: 350px; height: 210px; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); border-radius: 20px; color: white; display: flex; flex-direction: column; justify-content: space-between; padding: 25px; border: 1px solid rgba(212, 175, 55, 0.3); }

        /* Modals */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; z-index: 2100; backdrop-filter: blur(8px); }
        .modal-content { background: var(--card-bg); padding: 35px; border-radius: 24px; width: 90%; max-width: 400px; border: 1px solid var(--card-border); }

        .btn-main { width: 100%; padding: 16px; background: #0f172a; color: white; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; margin-top: 10px; }
        .btn-gold { width: 100%; padding: 16px; background: var(--accent); color: #0f172a; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; }
        input { width: 100%; padding: 14px; margin: 10px 0; border: 1.5px solid var(--card-border); border-radius: 12px; outline: none; background: var(--card-bg); color: var(--text-dark); }
        
        .fab { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: var(--accent); color: #0f172a; border-radius: 50%; border: none; font-size: 24px; cursor: pointer; box-shadow: 0 10px 15px rgba(212,175,55,0.3); }
    </style>
</head>
<body>

    <div id="loginSection">
        <div class="login-card">
            <i class="fas fa-shield-halved fa-3x" style="color: var(--accent); margin-bottom: 15px;"></i>
            <h2>ADMIN LOGIN</h2>
            <input type="text" id="adminUser" placeholder="Username">
            <input type="password" id="adminPass" placeholder="Password">
            <button class="btn-main" onclick="handleLogin()">LOGIN</button>
        </div>
    </div>

    <div id="mainContent" style="display: none;">
        <div class="header">
            <div class="nav-icons">
                <button class="icon-btn" onclick="toggleDarkMode()" id="darkBtn"><i class="fas fa-moon"></i></button>
                <button class="icon-btn" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i></button>
            </div>
            <h1 style="font-weight: 900; letter-spacing: 2px;">AGE <span style="color:var(--accent)">VIP</span></h1>
            <div class="dashboard">
                <div class="stat-card"> <h2 id="totalCount">0</h2> <p style="font-size: 10px; opacity: 0.7;">TOTAL USERS</p> </div>
                <div class="stat-card"> <h2 id="activeCount">0</h2> <p style="font-size: 10px; opacity: 0.7;">ACTIVE VIP</p> </div>
            </div>
        </div>

        <div class="search-container">
            <div style="position:relative;">
                <i class="fas fa-search" style="position:absolute; left:20px; top:20px; color:#94a3b8;"></i>
                <input type="text" id="searchInput" class="search-input" placeholder="Search by name or ID..." onkeyup="filterUsers()">
            </div>
        </div>

        <div class="container" id="listContainer"></div>
        <button class="fab" onclick="openInputModal()"><i class="fas fa-plus"></i></button>
    </div>

    <div class="modal-overlay" id="inputModal">
        <div class="modal-content">
            <h3 style="margin-bottom: 15px;">Add New VIP</h3>
            <input type="text" id="mId" placeholder="Client ID / Token">
            <input type="text" id="mName" placeholder="Customer Name">
            <input type="date" id="mDate">
            <button class="btn-main" onclick="handleSaveData()">SAVE & CREATE CARD</button>
            <button class="btn-main" style="background:#eee; color:#333;" onclick="document.getElementById('inputModal').style.display='none'">CANCEL</button>
        </div>
    </div>

    <div class="modal-overlay" id="voucherOverlay">
        <div style="display: flex; flex-direction: column; align-items: center;">
            <div class="vip-membership-card" id="voucherPrint">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div style="font-weight:900; color:var(--accent);">VIP MEMBERSHIP</div>
                    <div style="width:40px; height:28px; background:linear-gradient(135deg, #e5c06d, #b4934a); border-radius:6px;"></div>
                </div>
                <div id="vId" style="font-family:monospace; font-size:20px; font-weight:bold; letter-spacing:2px;"></div>
                <div style="display:flex; justify-content:space-between; align-items:flex-end;">
                    <div><span style="font-size:8px; opacity:0.6;">NAME</span><br><span id="vName" style="font-weight:bold;"></span></div>
                    <div style="text-align:right;"><span style="font-size:8px; opacity:0.6;">EXPIRY</span><br><span id="vExp" style="font-weight:bold; color:var(--accent);"></span></div>
                </div>
            </div>
            <button class="btn-gold" style="width:350px; margin-top:20px;" onclick="downloadVoucher()">SAVE TO GALLERY</button>
            <button onclick="document.getElementById('voucherOverlay').style.display='none'" style="color:white; background:none; border:none; margin-top:15px; cursor:pointer;">CLOSE PREVIEW</button>
        </div>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyB3cFSVLfpvHPeD732r-iL4Yfhi0wHEuOA",
            authDomain: "vipsystem-c301c.firebaseapp.com",
            projectId: "vipsystem-c301c",
            storageBucket: "vipsystem-c301c.firebasestorage.app",
            messagingSenderId: "386611318116",
            appId: "1:386611318116:android:6c19b4f20876ac4aba7e71"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let allUsers = [];

        // Auth
        function handleLogin() {
            const u = document.getElementById('adminUser').value;
            const p = document.getElementById('adminPass').value;
            if(u === "AGEVPN" && p === "1234567") {
                localStorage.setItem("ageLogin", "true");
                checkAuth();
            } else { alert("Login Failed!"); }
        }
        function handleLogout() { localStorage.removeItem("ageLogin"); checkAuth(); }
        function checkAuth() {
            const auth = localStorage.getItem("ageLogin");
            document.getElementById('loginSection').style.display = auth ? 'none' : 'flex';
            document.getElementById('mainContent').style.display = auth ? 'block' : 'none';
        }

        // Dark Mode Toggle
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const icon = document.querySelector('#darkBtn i');
            if(document.body.classList.contains('dark-mode')) {
                icon.className = 'fas fa-sun';
                localStorage.setItem("theme", "dark");
            } else {
                icon.className = 'fas fa-moon';
                localStorage.setItem("theme", "light");
            }
        }

        // Load Saved Theme
        if(localStorage.getItem("theme") === "dark") {
            document.body.classList.add('dark-mode');
            document.querySelector('#darkBtn i').className = 'fas fa-sun';
        }

        // User Logic
        function handleSaveData() {
            const id = document.getElementById('mId').value.trim();
            const name = document.getElementById('mName').value.trim();
            const exp = document.getElementById('mDate').value;
            if(!id || !name || !exp) return alert("Please fill all fields!");

            db.collection("users").doc(id).set({ username: name, expiryDate: exp }, { merge: true }).then(() => {
                document.getElementById('inputModal').style.display='none';
                document.getElementById('vId').innerText = id;
                document.getElementById('vName').innerText = name;
                document.getElementById('vExp').innerText = exp;
                document.getElementById('voucherOverlay').style.display = 'flex';
            });
        }

        function downloadVoucher() {
            html2canvas(document.getElementById('voucherPrint'), { scale: 3 }).then(canvas => {
                const link = document.createElement('a');
                link.download = `VIP_${document.getElementById('vName').innerText}.png`;
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        function renderUsers(users) {
            const list = document.getElementById('listContainer');
            list.innerHTML = "";
            users.forEach(u => {
                const days = Math.ceil((new Date(u.expiryDate) - new Date()) / 86400000);
                const color = days > 5 ? '#22c55e' : '#ef4444';
                list.innerHTML += `
                    <div class="user-card">
                        <div style="display:flex; justify-content:space-between; margin-bottom:12px;">
                            <span style="font-weight:bold; font-size:18px;">${u.username}</span>
                            <span style="font-size:10px; background:rgba(0,0,0,0.05); padding:4px 8px; border-radius:6px;">${u.id}</span>
                        </div>
                        <div style="font-size:12px; color:var(--text-light); margin-bottom:8px;">
                            Expires: ${u.expiryDate} 
                            <span style="float:right; color:${color}; font-weight:bold;">${days > 0 ? days+' Days' : 'Expired'}</span>
                        </div>
                        <div style="height:6px; background:rgba(0,0,0,0.05); border-radius:10px; overflow:hidden;">
                            <div style="width:${Math.max(0,(days/30)*100)}%; height:100%; background:${color};"></div>
                        </div>
                        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:20px;">
                            <button style="padding:10px; border-radius:10px; border:1px solid var(--card-border); background:none; color:var(--text-dark); cursor:pointer;" onclick="openInputModal('${u.id}','${u.username}','${u.expiryDate}')">Edit</button>
                            <button style="padding:10px; border-radius:10px; border:none; background:#fee2e2; color:#be123c; cursor:pointer;" onclick="if(confirm('Delete user?')) db.collection('users').doc('${u.id}').delete()">Delete</button>
                        </div>
                    </div>`;
            });
        }

        function filterUsers() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allUsers.filter(u => u.id.toLowerCase().includes(term) || u.username.toLowerCase().includes(term));
            renderUsers(filtered);
        }

        db.collection("users").onSnapshot(snap => {
            allUsers = []; let t = 0, a = 0;
            snap.forEach(doc => {
                t++; const d = doc.data();
                if(Math.ceil((new Date(d.expiryDate)-new Date())/86400000) > 0) a++;
                allUsers.push({ id: doc.id, ...d });
            });
            document.getElementById('totalCount').innerText = t;
            document.getElementById('activeCount').innerText = a;
            filterUsers();
        });

        function openInputModal(id='', name='', date='') {
            document.getElementById('mId').value = id;
            document.getElementById('mId').disabled = id !== '';
            document.getElementById('mName').value = name;
            document.getElementById('mDate').value = date;
            document.getElementById('inputModal').style.display = 'flex';
        }

        window.onload = checkAuth;
    </script>
</body>
</html>
