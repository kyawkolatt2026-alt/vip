<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGE VIP PREMIUM PANEL</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

    <style>
        :root {
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --bg-header: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
            --text-main: #1e293b;
            --text-dim: #64748b;
            --accent: #4f46e5;
            --gold: #fbbf24;
            --card-border: #cbd5e1;
            --name-bg: rgba(79, 70, 229, 0.08); 
        }

        body.dark-mode {
            --bg-body: #020617;
            --bg-card: #0f172a;
            --bg-header: linear-gradient(135deg, #000000 0%, #1e1b4b 100%);
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --accent: #818cf8;
            --card-border: #334155;
            --name-bg: rgba(251, 191, 36, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; transition: 0.2s; }
        body { background: var(--bg-body); color: var(--text-main); }

        #loginSection { 
            position: fixed; inset: 0; display: none; align-items: center; justify-content: center; 
            background: var(--bg-body); z-index: 9999; padding: 20px;
        }

        .header { background: var(--bg-header); padding: 40px 20px; text-align: center; color: white; border-bottom: 4px solid var(--gold); position: relative; }
        .nav-icons { position: absolute; top: 15px; right: 20px; display: flex; gap: 10px; }
        .icon-btn { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 10px; border-radius: 12px; cursor: pointer; }

        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 500px; margin: 20px auto 0; }
        .stat-card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); }
        .stat-card h2 { font-size: 28px; color: var(--gold); }

        .search-container { max-width: 500px; margin: -25px auto 0; padding: 0 15px; position: relative; z-index: 10; }
        .search-input { width: 100%; padding: 15px 15px 15px 45px; border-radius: 14px; border: 2px solid var(--accent); box-shadow: 0 10px 20px rgba(0,0,0,0.2); outline: none; background: var(--bg-card); color: var(--text-main); font-weight: bold; }

        .container { max-width: 1200px; margin: 30px auto; padding: 0 15px; display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 12px; padding-bottom: 100px; }
        .user-card { background: var(--bg-card); border: 2px solid var(--card-border); border-radius: 20px; padding: 15px; display: flex; flex-direction: column; gap: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); position: relative; overflow: hidden; }
        
        .status-badge { position: absolute; top: 10px; right: 10px; padding: 4px 10px; border-radius: 10px; font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.5px; }

        .card-top { display: flex; align-items: center; gap: 12px; }
        .progress-circle { position: relative; width: 55px; height: 55px; flex-shrink: 0; }
        .progress-circle svg { transform: rotate(-90deg); width: 55px; height: 55px; }
        .progress-circle circle { fill: none; stroke-width: 6; stroke-linecap: round; }
        .progress-circle .bg { stroke: rgba(128,128,128,0.1); }
        .progress-circle .percentage { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; }

        .user-info { flex-grow: 1; min-width: 0; }
        .user-name-wrapper { display: inline-block; background: var(--name-bg); padding: 4px 12px; border-radius: 10px; margin-bottom: 4px; border: 1px solid rgba(251, 191, 36, 0.15); }
        .user-name { font-weight: 900; font-size: 16px; color: var(--gold); }
        
        .action-group { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 5px; margin-top: 5px; }
        .act-btn { padding: 8px 4px; border-radius: 8px; border: none; font-size: 11px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 3px; }
        .btn-edit { background: #e0e7ff; color: #4338ca; }
        .btn-block { background: #fee2e2; color: #b91c1c; }
        .btn-unblock { background: #dcfce7; color: #15803d; }
        .btn-card { background: #fef3c7; color: #92400e; }
        .btn-delete { background: #f1f5f9; color: #475569; }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; z-index: 2100; backdrop-filter: blur(8px); }
        .modal-content { background: var(--bg-card); padding: 25px; border-radius: 24px; width: 90%; max-width: 400px; border: 2px solid var(--accent); }
        
        /* Quick Select Buttons Style */
        .quick-date-group { display: flex; gap: 8px; margin-bottom: 10px; }
        .q-date-btn { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid var(--card-border); background: var(--bg-body); color: var(--text-main); font-size: 11px; font-weight: bold; cursor: pointer; }
        .q-date-btn:hover { background: var(--accent); color: white; border-color: var(--accent); }

        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 2px solid var(--card-border); background: var(--bg-body); color: var(--text-main); font-weight: bold; }
        .btn-main { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; margin-top: 10px; }
        
        .fab { position: fixed; bottom: 30px; right: 30px; width: 65px; height: 65px; background: var(--accent); color: white; border-radius: 22px; border: none; font-size: 26px; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.3); z-index: 1000; }

        .vip-membership-card { width: 340px; height: 200px; background: #020617; border-radius: 18px; padding: 22px; border: 2px solid var(--gold); color: white; display: flex; flex-direction: column; justify-content: space-between; position: relative; overflow: hidden; }
        .card-inner { position: relative; z-index: 2; height: 100%; display: flex; flex-direction: column; justify-content: space-between; }
    </style>
</head>
<body class="dark-mode">

    <div id="loginSection">
        <div class="login-card" style="background: var(--bg-card); padding: 40px; border-radius: 24px; border: 2px solid var(--accent); text-align: center; width: 100%; max-width: 380px;">
            <h2 style="color:var(--accent); margin-bottom: 20px; font-weight: 900;">AGE ADMIN</h2>
            <input type="text" id="adminUser" placeholder="Username">
            <input type="password" id="adminPass" placeholder="Password">
            <button class="btn-main" onclick="handleLogin()">LOGIN</button>
        </div>
    </div>

    <div id="mainContent" style="display: none;">
        <div class="header">
            <div class="nav-icons">
                <button class="icon-btn" onclick="toggleMode()"><i id="modeIcon" class="fas fa-sun"></i></button>
                <button class="icon-btn" onclick="handleLogout()"><i class="fas fa-power-off"></i></button>
            </div>
            <h1 style="font-weight: 900; font-size: 28px;">AGE <span style="color:var(--gold)">VIP</span> PANEL</h1>
            <div class="dashboard">
                <div class="stat-card"> <h2 id="totalCount">0</h2> <p style="font-size: 10px; font-weight: bold;">TOTAL USERS</p> </div>
                <div class="stat-card"> <h2 id="activeCount">0</h2> <p style="font-size: 10px; font-weight: bold;">ACTIVE VIP</p> </div>
            </div>
        </div>

        <div class="search-container">
            <i class="fas fa-search" style="position:absolute; left:20px; top:18px; color:var(--accent);"></i>
            <input type="text" id="searchInput" class="search-input" placeholder="Search account ID or Name..." onkeyup="filterUsers()">
        </div>

        <div class="container" id="listContainer"></div>
        <button class="fab" onclick="openInputModal()"><i class="fas fa-plus"></i></button>
    </div>

    <div class="modal-overlay" id="inputModal">
        <div class="modal-content">
            <h3 style="margin-bottom: 15px; font-weight: 900; color: var(--accent);">REGISTER LICENSE</h3>
            <input type="text" id="mId" placeholder="Account ID / Token">
            <input type="text" id="mName" placeholder="Customer Name">
            
            <p style="font-size: 11px; font-weight: bold; margin-bottom: 5px; opacity: 0.7;">SELECT DURATION:</p>
            <div class="quick-date-group">
                <button class="q-date-btn" onclick="addMonths(1)">1 Month</button>
                <button class="q-date-btn" onclick="addMonths(2)">2 Months</button>
                <button class="q-date-btn" onclick="addMonths(12)">1 Year</button>
            </div>
            <input type="date" id="mDate">
            
            <button class="btn-main" onclick="handleSaveData()">ACTIVATE VIP</button>
            <button class="btn-main" style="background:#64748b; margin-top: 5px;" onclick="document.getElementById('inputModal').style.display='none'">CANCEL</button>
        </div>
    </div>

    <div class="modal-overlay" id="voucherOverlay">
        <div style="display: flex; flex-direction: column; align-items: center;">
            <div class="vip-membership-card" id="voucherPrint">
                <div class="card-inner">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <div style="font-weight: 900; color: var(--gold); font-size: 18px;"><i class="fas fa-crown"></i> AGE VIP</div>
                        <div style="width: 40px; height: 30px; background: linear-gradient(135deg, #fbbf24, #d97706); border-radius: 6px;"></div>
                    </div>
                    <div id="vId" style="font-family: monospace; font-size: 22px; letter-spacing: 2.5px; font-weight: bold; color: #fff;">0000 0000 0000</div>
                    <div style="display: flex; justify-content: space-between; align-items: flex-end;">
                        <div><span style="font-size: 8px; opacity: 0.6;">MEMBER NAME</span><br><span id="vName" style="font-weight: bold; font-size: 15px; text-transform: uppercase;">USER NAME</span></div>
                        <div style="text-align: right;"><span style="font-size: 8px; opacity: 0.6;">EXPIRY DATE</span><br><span id="vExp" style="font-weight: bold; color: var(--gold); font-size: 14px;">00/00/0000</span></div>
                    </div>
                </div>
            </div>
            <button class="btn-main" style="width:340px; margin-top:15px; background: var(--gold); color: #000;" onclick="downloadVoucher()">DOWNLOAD CARD</button>
            <button onclick="document.getElementById('voucherOverlay').style.display='none'" style="color:white; margin-top:15px; background:none; border:none; opacity:0.6; cursor:pointer;">CLOSE</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB3cFSVLfpvHPeD732r-iL4Yfhi0wHEuOA",
            authDomain: "vipsystem-c301c.firebaseapp.com",
            projectId: "vipsystem-c301c",
            storageBucket: "vipsystem-c301c.firebasestorage.app",
            messagingSenderId: "386611318116",
            appId: "1:386611318116:android:6c19b4f20876ac4aba7e71"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let allUsers = [];

        function toggleMode() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            document.getElementById('modeIcon').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
        }

        // Quick Date Function
        function addMonths(months) {
            let d = new Date();
            d.setMonth(d.getMonth() + months);
            document.getElementById('mDate').value = d.toISOString().split('T')[0];
        }

        function handleLogin() {
            const user = document.getElementById('adminUser').value;
            const pass = document.getElementById('adminPass').value;
            if(user === "AGEVPN" && pass === "1234567") {
                localStorage.setItem("ageLogin", "true");
                checkAuth();
            } else alert("Incorrect Credentials!");
        }

        function handleLogout() {
            localStorage.removeItem("ageLogin");
            location.reload();
        }

        function checkAuth() {
            const auth = localStorage.getItem("ageLogin");
            if (auth === "true") {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
            } else {
                document.getElementById('loginSection').style.display = 'flex';
                document.getElementById('mainContent').style.display = 'none';
            }
        }

        function showVoucher(id, name, exp) {
            document.getElementById('vId').innerText = id;
            document.getElementById('vName').innerText = name;
            document.getElementById('vExp').innerText = exp.split('-').reverse().join('/');
            document.getElementById('voucherOverlay').style.display = 'flex';
        }

        function handleSaveData() {
            const id = document.getElementById('mId').value.trim(), 
                  name = document.getElementById('mName').value.trim(), 
                  exp = document.getElementById('mDate').value;
            if(!id || !name || !exp) return alert("Fill all!");
            db.collection("users").doc(id).set({ username: name, expiryDate: exp, isActive: true }, { merge: true })
            .then(() => {
                document.getElementById('inputModal').style.display='none';
                showVoucher(id, name, exp);
            });
        }

        function toggleUserStatus(id, currentStatus) {
            db.collection("users").doc(id).update({ isActive: !currentStatus });
        }

        function renderUsers(users) {
            const list = document.getElementById('listContainer');
            list.innerHTML = "";
            users.forEach(u => {
                const days = Math.ceil((new Date(u.expiryDate) - new Date()) / 86400000);
                const isExpired = days <= 0;
                const active = u.isActive !== false;
                const color = active ? (isExpired ? '#ef4444' : '#22c55e') : '#64748b';
                const statusText = active ? (isExpired ? 'Expired' : 'Active') : 'Blocked';
                const stroke = 154;
                const percent = isExpired ? 0 : Math.min(100, (days / 30) * 100);
                const offset = stroke - (percent / 100) * stroke;

                list.innerHTML += `
                    <div class="user-card" style="border-left: 5px solid ${color}">
                        <div class="status-badge" style="background:${color}20; color:${color}; border: 1px solid ${color}40;">${statusText}</div>
                        <div class="card-top">
                            <div class="progress-circle">
                                <svg><circle class="bg" cx="27.5" cy="27.5" r="24.5"/><circle class="fg" cx="27.5" cy="27.5" r="24.5" style="stroke-dasharray: ${stroke}; stroke-dashoffset: ${offset}; stroke: ${color};"/></svg>
                                <div class="percentage" style="color:${color}">${isExpired ? 'EXP' : days + 'D'}</div>
                            </div>
                            <div class="user-info">
                                <div class="user-name-wrapper">
                                    <span class="user-name">${u.username}</span>
                                </div>
                                <div style="font-size: 10px; color: var(--text-dim); font-weight: bold;">ID: ${u.id} | EXP: ${u.expiryDate}</div>
                            </div>
                        </div>
                        <div class="action-group">
                            <button class="act-btn btn-edit" onclick="openInputModal('${u.id}','${u.username}','${u.expiryDate}')">Edit</button>
                            <button class="act-btn ${active ? 'btn-block' : 'btn-unblock'}" onclick="toggleUserStatus('${u.id}', ${active})">${active ? 'Block' : 'Active'}</button>
                            <button class="act-btn btn-card" onclick="showVoucher('${u.id}','${u.username}','${u.expiryDate}')">Card</button>
                            <button class="act-btn btn-delete" onclick="if(confirm('Delete?')) db.collection('users').doc('${u.id}').delete()">Del</button>
                        </div>
                    </div>`;
            });
        }

        function filterUsers() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allUsers.filter(u => u.id.toLowerCase().includes(term) || u.username.toLowerCase().includes(term));
            renderUsers(filtered);
        }

        db.collection("users").onSnapshot(snap => {
            allUsers = []; let t = 0, a = 0;
            snap.forEach(doc => {
                t++; const d = doc.data();
                if(d.isActive && (new Date(d.expiryDate) > new Date())) a++;
                allUsers.push({ id: doc.id, ...d });
            });
            document.getElementById('totalCount').innerText = t;
            document.getElementById('activeCount').innerText = a;
            filterUsers();
        });

        function openInputModal(id='', name='', date='') {
            document.getElementById('mId').value = id;
            document.getElementById('mId').disabled = id !== '';
            document.getElementById('mName').value = name;
            document.getElementById('mDate').value = date;
            document.getElementById('inputModal').style.display = 'flex';
        }

        function downloadVoucher() {
            html2canvas(document.getElementById('voucherPrint'), { scale: 3 }).then(canvas => {
                const link = document.createElement('a');
                link.download = `AGE_VIP_${document.getElementById('vName').innerText}.png`;
                link.href = canvas.toDataURL(); link.click();
            });
        }

        window.onload = checkAuth;
    </script>
</body>
</html>
