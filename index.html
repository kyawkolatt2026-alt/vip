<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGE VIP PREMIUM PANEL</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

    <style>
        /* CSS Variables for Dynamic Colors */
        :root {
            --bg-body: #f1f5f9;
            --bg-card: #ffffff;
            --bg-header: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --text-main: #0f172a;
            --text-dim: #64748b;
            --accent: #6366f1;
            --gold: #f59e0b;
            --card-border: #e2e8f0;
        }

        /* Dark Mode Colors */
        body.dark-mode {
            --bg-body: #020617;
            --bg-card: #0f172a;
            --bg-header: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #818cf8;
            --card-border: #1e293b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; transition: background 0.3s, color 0.3s; }
        body { background: var(--bg-body); color: var(--text-main); }

        /* Login */
        #loginSection { position: fixed; inset: 0; background: #020617; display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .login-card { background: var(--bg-card); padding: 40px; border-radius: 24px; width: 90%; max-width: 380px; text-align: center; border: 1px solid var(--accent); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        /* Header Area */
        .header { background: var(--bg-header); padding: 40px 20px; text-align: center; position: relative; border-bottom: 3px solid rgba(255,255,255,0.1); color: white; }
        .nav-icons { position: absolute; top: 15px; right: 20px; display: flex; gap: 10px; }
        .icon-btn { background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 10px; border-radius: 12px; cursor: pointer; backdrop-filter: blur(5px); }
        .icon-btn:hover { background: rgba(255,255,255,0.25); }

        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 500px; margin: 20px auto 0; }
        .stat-card { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); }
        .stat-card h2 { font-size: 28px; color: #fbbf24; }

        .search-container { max-width: 500px; margin: -25px auto 0; padding: 0 15px; position: relative; z-index: 10; }
        .search-input { width: 100%; padding: 15px 15px 15px 45px; border-radius: 14px; border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.1); font-weight: 600; outline: none; background: var(--bg-card); color: var(--text-main); border: 1px solid var(--card-border); }

        /* User Cards - Tight spacing */
        .container { max-width: 1200px; margin: 30px auto; padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 10px; padding-bottom: 100px; }
        .user-card { background: var(--bg-card); border: 1px solid var(--card-border); border-radius: 16px; padding: 12px; display: flex; align-items: center; gap: 12px; }
        
        /* Progress Circle */
        .progress-circle { position: relative; width: 50px; height: 50px; flex-shrink: 0; }
        .progress-circle svg { transform: rotate(-90deg); width: 50px; height: 50px; }
        .progress-circle circle { fill: none; stroke-width: 5; stroke-linecap: round; }
        .progress-circle .bg { stroke: rgba(128,128,128,0.1); }
        .progress-circle .fg { transition: 0.5s ease; }
        .progress-circle .percentage { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; }

        .user-info { flex-grow: 1; min-width: 0; }
        .user-name { font-weight: 700; font-size: 14px; display: flex; align-items: center; gap: 5px; }
        .status-dot { width: 7px; height: 7px; border-radius: 50%; }

        /* Form Inputs & Buttons */
        .btn-main { width: 100%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; margin-top: 10px; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 2100; backdrop-filter: blur(8px); }
        .modal-content { background: var(--bg-card); padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; border: 1px solid var(--card-border); }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid var(--card-border); background: var(--bg-body); color: var(--text-main); outline: none; }
        
        .fab { position: fixed; bottom: 25px; right: 25px; width: 60px; height: 60px; background: var(--accent); color: white; border-radius: 20px; border: none; font-size: 24px; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }

        /* VIP Card Preview */
        .vip-membership-card { width: 340px; height: 200px; background: #020617; border-radius: 18px; padding: 22px; border: 1px solid var(--gold); color: white; display: flex; flex-direction: column; justify-content: space-between; }
    </style>
</head>
<body class="dark-mode"> <div id="loginSection">
        <div class="login-card">
            <h2 style="color:var(--accent); margin-bottom: 20px; font-weight: 900;">AGE ADMIN</h2>
            <input type="text" id="adminUser" placeholder="Username">
            <input type="password" id="adminPass" placeholder="Password">
            <button class="btn-main" onclick="handleLogin()">LOGIN</button>
        </div>
    </div>

    <div id="mainContent" style="display: none;">
        <div class="header">
            <div class="nav-icons">
                <button class="icon-btn" onclick="toggleMode()"><i id="modeIcon" class="fas fa-sun"></i></button>
                <button class="icon-btn" onclick="handleLogout()"><i class="fas fa-power-off"></i></button>
            </div>
            <h1 style="font-weight: 900; font-size: 28px; letter-spacing: 1px;">AGE <span style="color:#fbbf24">VIP</span> PANEL</h1>
            <div class="dashboard">
                <div class="stat-card"> <h2 id="totalCount">0</h2> <p style="font-size: 10px; opacity: 0.8;">USERS</p> </div>
                <div class="stat-card"> <h2 id="activeCount">0</h2> <p style="font-size: 10px; opacity: 0.8;">ACTIVE</p> </div>
            </div>
        </div>

        <div class="search-container">
            <i class="fas fa-search" style="position:absolute; left:30px; top:18px; color:var(--accent);"></i>
            <input type="text" id="searchInput" class="search-input" placeholder="Search by name or token..." onkeyup="filterUsers()">
        </div>

        <div class="container" id="listContainer"></div>
        <button class="fab" onclick="openInputModal()"><i class="fas fa-plus"></i></button>
    </div>

    <div class="modal-overlay" id="inputModal">
        <div class="modal-content">
            <h3 style="margin-bottom: 15px; font-weight: 900;">NEW LICENSE</h3>
            <input type="text" id="mId" placeholder="Token / Serial ID">
            <input type="text" id="mName" placeholder="Customer Name">
            <input type="date" id="mDate">
            <button class="btn-main" onclick="handleSaveData()">ACTIVATE VIP</button>
            <button class="btn-main" style="background:transparent; color:var(--text-dim); border:1px solid var(--card-border);" onclick="document.getElementById('inputModal').style.display='none'">CLOSE</button>
        </div>
    </div>

    <div class="modal-overlay" id="voucherOverlay">
        <div style="display: flex; flex-direction: column; align-items: center;">
            <div class="vip-membership-card" id="voucherPrint">
                <div style="display: flex; justify-content: space-between;">
                    <div style="font-weight: 900; color: #fbbf24;"><i class="fas fa-crown"></i> AGE VIP</div>
                    <div style="width: 35px; height: 25px; background: #fbbf24; border-radius: 4px;"></div>
                </div>
                <div id="vId" style="font-family: monospace; font-size: 18px; letter-spacing: 2px;">0000 0000 0000</div>
                <div style="display: flex; justify-content: space-between; align-items: flex-end;">
                    <div><span style="font-size: 7px; opacity: 0.5;">MEMBER</span><br><span id="vName" style="font-weight: bold;">User Name</span></div>
                    <div style="text-align: right;"><span style="font-size: 7px; opacity: 0.5;">EXPIRY</span><br><span id="vExp" style="font-weight: bold; color: #fbbf24;">00/00/00</span></div>
                </div>
            </div>
            <button class="btn-main" style="width:340px; margin-top:15px;" onclick="downloadVoucher()">SAVE IMAGE</button>
            <button onclick="document.getElementById('voucherOverlay').style.display='none'" style="color:white; margin-top:15px; background:none; border:none; opacity:0.6; cursor:pointer;">BACK</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB3cFSVLfpvHPeD732r-iL4Yfhi0wHEuOA",
            authDomain: "vipsystem-c301c.firebaseapp.com",
            projectId: "vipsystem-c301c",
            storageBucket: "vipsystem-c301c.firebasestorage.app",
            messagingSenderId: "386611318116",
            appId: "1:386611318116:android:6c19b4f20876ac4aba7e71"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let allUsers = [];

        function toggleMode() {
            const body = document.body;
            body.classList.toggle('dark-mode');
            const isDark = body.classList.contains('dark-mode');
            document.getElementById('modeIcon').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
        }

        function handleLogin() {
            if(document.getElementById('adminUser').value === "AGEVPN" && document.getElementById('adminPass').value === "1234567") {
                localStorage.setItem("ageLogin", "true"); checkAuth();
            } else alert("Error Login!");
        }
        function handleLogout() { localStorage.removeItem("ageLogin"); checkAuth(); }
        function checkAuth() {
            const auth = localStorage.getItem("ageLogin");
            document.getElementById('loginSection').style.display = auth ? 'none' : 'flex';
            document.getElementById('mainContent').style.display = auth ? 'block' : 'none';
        }

        function handleSaveData() {
            const id = document.getElementById('mId').value.trim(), name = document.getElementById('mName').value.trim(), exp = document.getElementById('mDate').value;
            if(!id || !name || !exp) return alert("Fill all!");
            db.collection("users").doc(id).set({ username: name, expiryDate: exp, isActive: true }, { merge: true }).then(() => {
                document.getElementById('inputModal').style.display='none';
                document.getElementById('vId').innerText = id; document.getElementById('vName').innerText = name;
                document.getElementById('vExp').innerText = exp; document.getElementById('voucherOverlay').style.display = 'flex';
            });
        }

        function toggleUserStatus(id, currentStatus) { db.collection("users").doc(id).update({ isActive: !currentStatus }); }

        function renderUsers(users) {
            const list = document.getElementById('listContainer'); list.innerHTML = "";
            users.forEach(u => {
                const days = Math.ceil((new Date(u.expiryDate) - new Date()) / 86400000);
                const isExpired = days <= 0; const active = u.isActive !== false;
                const percent = isExpired ? 0 : Math.min(100, (days / 30) * 100);
                const color = active ? (isExpired ? '#ef4444' : (days < 5 ? '#f59e0b' : '#22c55e')) : '#64748b';
                const stroke = 125.6; const offset = stroke - (percent / 100) * stroke;

                list.innerHTML += `
                    <div class="user-card">
                        <div class="progress-circle">
                            <svg><circle class="bg" cx="25" cy="25" r="20"/><circle class="fg" cx="25" cy="25" r="20" style="stroke-dasharray: ${stroke}; stroke-dashoffset: ${offset}; stroke: ${color};"/></svg>
                            <div class="percentage" style="color:${color}">${isExpired ? 'EXP' : days + 'D'}</div>
                        </div>
                        <div class="user-info">
                            <div class="user-name">
                                <span class="status-dot" style="background:${color}"></span> ${u.username}
                            </div>
                            <div style="font-size: 9px; color: var(--text-dim); margin-top: 1px;">ID: ${u.id}</div>
                            <div style="margin-top: 5px; display: flex; gap: 12px; font-size: 13px;">
                                <i class="fas fa-edit" style="color:var(--text-dim); cursor:pointer;" onclick="openInputModal('${u.id}','${u.username}','${u.expiryDate}')"></i>
                                <i class="fas fa-${active ? 'ban' : 'check-circle'}" style="color:${active ? '#ef4444' : '#22c55e'}; cursor:pointer;" onclick="toggleUserStatus('${u.id}', ${active})"></i>
                                <i class="fas fa-trash" style="color:#ef4444; cursor:pointer;" onclick="if(confirm('Delete?')) db.collection('users').doc('${u.id}').delete()"></i>
                            </div>
                        </div>
                    </div>`;
            });
        }

        function filterUsers() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allUsers.filter(u => u.id.toLowerCase().includes(term) || u.username.toLowerCase().includes(term));
            renderUsers(filtered);
        }

        db.collection("users").onSnapshot(snap => {
            allUsers = []; let t = 0, a = 0;
            snap.forEach(doc => { t++; const d = doc.data(); if(d.isActive && (new Date(d.expiryDate) > new Date())) a++; allUsers.push({ id: doc.id, ...d }); });
            document.getElementById('totalCount').innerText = t; document.getElementById('activeCount').innerText = a;
            filterUsers();
        });

        function openInputModal(id='', name='', date='') {
            document.getElementById('mId').value = id; document.getElementById('mId').disabled = id !== '';
            document.getElementById('mName').value = name; document.getElementById('mDate').value = date;
            document.getElementById('inputModal').style.display = 'flex';
        }
        function downloadVoucher() {
            html2canvas(document.getElementById('voucherPrint'), { scale: 3 }).then(canvas => {
                const link = document.createElement('a'); link.download = 'VIP_CARD.png'; link.href = canvas.toDataURL(); link.click();
            });
        }
        window.onload = checkAuth;
    </script>
</body>
</html>
