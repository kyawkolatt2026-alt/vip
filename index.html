<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGE VIP PREMIUM PANEL</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

    <style>
        /* Luxury Midnight Emerald & Rose Gold Theme */
        :root {
            --bg-body: #f4f6f9;
            --bg-card: #ffffff;
            --bg-header: linear-gradient(135deg, #064e3b 0%, #022c22 100%);
            --text-main: #0f172a;
            --text-dim: #64748b;
            --accent: #34d399;
            --gold: #fbbf24;
            --card-border: #e2e8f0;
        }

        body.dark-mode {
            --bg-body: #060a12; 
            --bg-card: #0f192a; 
            --bg-header: linear-gradient(135deg, #022c22 0%, #011510 100%); 
            --text-main: #f1f5f9;
            --text-dim: #64748b;
            --accent: #34d399; 
            --gold: #f59e0b;   
            --card-border: #1e293b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; transition: 0.2s; }
        body { background: var(--bg-body); color: var(--text-main); }

        #loginSection { 
            position: fixed; inset: 0; display: none; align-items: center; justify-content: center; 
            background: var(--bg-body); z-index: 9999; padding: 20px;
        }

        .header { background: var(--bg-header); padding: 40px 20px; text-align: center; color: white; border-bottom: 4px solid var(--gold); position: relative; }
        .nav-icons { position: absolute; top: 15px; right: 20px; display: flex; gap: 10px; }
        .icon-btn { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 10px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 500px; margin: 20px auto 0; }
        .stat-card { background: rgba(255,255,255,0.06); padding: 15px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(4px); }
        .stat-card h2 { font-size: 28px; color: var(--gold); }

        .search-container { max-width: 500px; margin: -25px auto 0; padding: 0 15px; position: relative; z-index: 10; }
        .search-input { width: 100%; padding: 15px 15px 15px 45px; border-radius: 14px; border: 2px solid var(--accent); box-shadow: 0 10px 25px rgba(0,0,0,0.15); outline: none; background: var(--bg-card); color: var(--text-main); font-weight: bold; }

        .container { max-width: 1200px; margin: 30px auto; padding: 0 15px; display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 15px; padding-bottom: 100px; }
        
        .user-card { background: var(--bg-card); border: 1px solid var(--card-border); border-radius: 22px; padding: 18px; display: grid; grid-template-rows: auto auto auto; gap: 12px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); position: relative; overflow: hidden; }
        
        .status-badge { position: absolute; top: 15px; right: 15px; padding: 4px 10px; border-radius: 8px; font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.5px; z-index: 10; }

        .card-top { display: grid; grid-template-columns: auto 1fr; align-items: center; gap: 15px; }
        
        .progress-circle { position: relative; width: 64px; height: 64px; flex-shrink: 0; }
        .progress-circle svg { transform: rotate(-90deg); width: 64px; height: 64px; display: block; }
        .progress-circle circle { fill: none; stroke-width: 6; stroke-linecap: round; }
        .progress-circle .bg { stroke: rgba(128,128,128,0.15); }
        .progress-circle .percentage { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 900; }

        .user-info { flex-grow: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
        
        .user-name-title { font-weight: 900; font-size: 18px; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 6px; }
        .user-name-title i { color: var(--gold); font-size: 14px; } 
        .user-sub-title { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }

        .user-data-wrapper { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; border-top: 1px solid var(--card-border); border-bottom: 1px solid var(--card-border); padding: 12px 0; }
        .data-item { display: flex; flex-direction: column; gap: 3px; }
        .data-item.right-align { text-align: right; align-items: flex-end; } 
        
        .data-label { font-size: 10px; color: var(--text-dim); font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; }
        .data-value { font-size: 13px; color: var(--text-main); font-weight: 900; }
        .data-value.id { font-family: monospace; font-size: 13px; color: var(--accent); }

        .action-group { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 6px; margin-top: 4px; }
        .act-btn { padding: 9px 4px; border-radius: 10px; border: none; font-size: 11px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 4px; transition: 0.2s; }
        .act-btn:hover { opacity: 0.85; transform: translateY(-1px); }
        
        .btn-edit { background: #2563eb; color: #ffffff; }
        .btn-block { background: #dc2626; color: #ffffff; }
        .btn-unblock { background: #059669; color: #ffffff; }
        .btn-card { background: #d97706; color: #ffffff; }
        .btn-delete { background: #4b5563; color: #ffffff; }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; z-index: 2100; backdrop-filter: blur(8px); }
        .modal-content { background: var(--bg-card); padding: 25px; border-radius: 24px; width: 90%; max-width: 400px; border: 2px solid var(--accent); box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        
        .quick-date-group { display: flex; gap: 8px; margin-bottom: 10px; }
        .q-date-btn { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid var(--card-border); background: var(--bg-body); color: var(--text-main); font-size: 11px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .q-date-btn:hover { background: var(--accent); color: #000000; border-color: var(--accent); }

        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid var(--card-border); background: var(--bg-body); color: var(--text-main); font-weight: bold; }
        input:focus { border-color: var(--accent); outline: none; }
        .btn-main { width: 100%; padding: 15px; background: var(--accent); color: #000000; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; margin-top: 10px; letter-spacing: 0.5px; }
        
        .fab { 
            position: fixed; 
            bottom: 30px; 
            right: 30px; 
            width: 65px; 
            height: 65px; 
            background: var(--accent); 
            color: #000000 !important; 
            border-radius: 22px; 
            border: none; 
            font-size: 26px; 
            cursor: pointer; 
            box-shadow: 0 10px 25px rgba(52, 211, 153, 0.4); 
            z-index: 9999; 
            transition: transform 0.2s; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        .fab:hover { transform: scale(1.08); }
        .fab i { color: #000000 !important; }

        .vip-membership-card { 
            width: 340px; 
            height: 200px; 
            background: linear-gradient(135deg, #021a14 0%, #010a08 100%); 
            border-radius: 24px; 
            padding: 24px; 
            border: 1.5px solid rgba(52, 211, 153, 0.25); 
            color: white; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            position: relative; 
            overflow: hidden; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.6); 
        }
        
        .vip-membership-card::before {
            content: ''; position: absolute; top: -50px; right: -50px; 
            width: 150px; height: 150px; 
            background: radial-gradient(circle, rgba(52, 211, 153, 0.15) 0%, transparent 70%);
            pointer-events: none;
        }

        .card-inner { position: relative; z-index: 2; height: 100%; display: flex; flex-direction: column; justify-content: space-between; }
        
        .premium-days-clean {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2px 0;
            background: none !important; 
            border: none !important;     
            box-shadow: none !important;  
        }

        .premium-days-clean span {
            font-family: 'Space Mono', monospace, 'Courier New', Courier;
            font-size: 14px;
            font-weight: 900;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            text-shadow: none !important; 
        }

        .delete-btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn-confirm-del { padding: 12px; background: #dc2626; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-cancel-del { padding: 12px; background: #4b5563; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body class="dark-mode">

    <div id="loginSection">
        <div class="login-card" style="background: var(--bg-card); padding: 40px; border-radius: 24px; border: 2px solid var(--accent); text-align: center; width: 100%; max-width: 380px;">
            <h2 style="color:var(--accent); margin-bottom: 20px; font-weight: 900; letter-spacing: 1px;">AGE ADMIN</h2>
            <input type="text" id="adminUser" placeholder="Username">
            <input type="password" id="adminPass" placeholder="Password">
            <button class="btn-main" onclick="handleLogin()">LOGIN</button>
        </div>
    </div>

    <div id="mainContent" style="display: none;">
        <div class="header">
            <div class="nav-icons">
                <button class="icon-btn" onclick="toggleMode()"><i id="modeIcon" class="fas fa-sun" style="color:white;"></i></button>
                <button class="icon-btn" onclick="handleLogout()"><i class="fas fa-power-off" style="color:white;"></i></button>
            </div>
            <h1 style="font-weight: 900; font-size: 28px; letter-spacing: 0.5px; color: white;">AGE <span style="color:var(--gold)">VIP</span> PANEL</h1>
            <div class="dashboard">
                <div class="stat-card"> <h2 id="totalCount">0</h2> <p style="font-size: 10px; font-weight: bold; opacity: 0.7; color: white;">TOTAL USERS</p> </div>
                <div class="stat-card"> <h2 id="activeCount">0</h2> <p style="font-size: 10px; font-weight: bold; opacity: 0.7; color: white;">ACTIVE VIP</p> </div>
            </div>
        </div>

        <div class="search-container">
            <i class="fas fa-search" style="position:absolute; left:20px; top:18px; color:var(--accent);"></i>
            <input type="text" id="searchInput" class="search-input" placeholder="Search account ID or Name..." onkeyup="filterUsers()">
        </div>

        <div class="container" id="listContainer"></div>
        
        <button class="fab" onclick="openInputModal()"><i class="fas fa-plus"></i></button>
    </div>

    <!-- REGISTER MODAL -->
    <div class="modal-overlay" id="inputModal">
        <div class="modal-content">
            <h3 style="margin-bottom: 15px; font-weight: 900; color: var(--accent);">REGISTER LICENSE</h3>
            <input type="text" id="mId" placeholder="Account ID / Token">
            <input type="text" id="mName" placeholder="Customer Name">
            
            <p style="font-size: 11px; font-weight: bold; margin-bottom: 5px; opacity: 0.7;">SELECT DURATION:</p>
            <div class="quick-date-group">
                <button class="q-date-btn" onclick="addFixedDays(30)">1 Month (30D)</button>
                <button class="q-date-btn" onclick="addFixedDays(60)">2 Months (60D)</button>
                <button class="q-date-btn" onclick="addFixedDays(360)">1 Year (360D)</button>
            </div>
            <input type="date" id="mDate">
            
            <button class="btn-main" onclick="handleSaveData()">ACTIVATE VIP</button>
            <button class="btn-main" style="background:#4b5563; color: white; margin-top: 5px;" onclick="document.getElementById('inputModal').style.display='none'">CANCEL</button>
        </div>
    </div>

    <!-- CUSTOM DELETE CONFIRMATION MODAL -->
    <div class="modal-overlay" id="deleteModal">
        <div class="modal-content" style="border-color: #dc2626; text-align: center;">
            <i class="fas fa-exclamation-triangle" style="font-size: 40px; color: #dc2626; margin-bottom: 15px;"></i>
            <h3 style="font-weight: 900; color: var(--text-main); margin-bottom: 10px;">Are you sure?</h3>
            <p style="font-size: 14px; color: var(--text-dim);">Do you really want to delete this user <br><b id="deleteTargetName" style="color:var(--text-main)"></b>?</p>
            <div class="delete-btn-group">
                <button class="btn-confirm-del" onclick="executeDelete()">YES, DELETE</button>
                <button class="btn-cancel-del" onclick="closeDeleteModal()">CANCEL</button>
            </div>
        </div>
    </div>

    <!-- VOUCHER MODAL -->
    <div class="modal-overlay" id="voucherOverlay">
        <div style="display: flex; flex-direction: column; align-items: center;">
            <div class="vip-membership-card" id="voucherPrint">
                <div class="card-inner">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <div style="font-weight: 900; color: var(--gold); font-size: 20px; letter-spacing: 0.5px;"><i class="fas fa-crown" style="color:var(--gold);"></i> AGE VIP</div>
                        <div class="premium-days-clean">
                            <span id="vDaysLeft">30 DAYS</span>
                        </div>
                    </div>
                    
                    <div id="vId" style="font-family: monospace; font-size: 22px; letter-spacing: 2.5px; font-weight: bold; color: #fff; margin-top: 15px;">0000 0000 0000</div>
                    
                    <div style="display: flex; justify-content: space-between; align-items: flex-end;">
                        <div><span style="font-size: 8px; opacity: 0.5; font-weight: bold; letter-spacing: 0.5px;">MEMBER NAME</span><br><span id="vName" style="font-weight: bold; font-size: 15px; text-transform: uppercase; color: #ffffff;">USER NAME</span></div>
                        <div style="text-align: right;"><span style="font-size: 8px; opacity: 0.5; font-weight: bold; letter-spacing: 0.5px;">EXPIRY DATE</span><br><span id="vExp" style="font-weight: bold; color: var(--gold); font-size: 14px;">00/00/0000</span></div>
                    </div>
                </div>
            </div>
            <button class="btn-main" style="width:340px; margin-top:15px; background: var(--gold); color: #000000;" onclick="downloadVoucher()">DOWNLOAD CARD</button>
            <button onclick="document.getElementById('voucherOverlay').style.display='none'" style="color:white; margin-top:15px; background:none; border:none; opacity:0.6; cursor:pointer;">CLOSE</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB3cFSVLfpvHPeD732r-iL4Yfhi0wHEuOA",
            authDomain: "vipsystem-c301c.firebaseapp.com",
            projectId: "vipsystem-c301c",
            storageBucket: "vipsystem-c301c.firebasestorage.app",
            messagingSenderId: "386611318116",
            appId: "1:386611318116:android:6c19b4f20876ac4aba7e71"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let allUsers = [];
        let userIdToDelete = null;

        /* ရက်အလိုက် ကာလာခွဲခြားပေးမည့် Function */
        function getProgressColor(days, isActive) {
            if (!isActive) return '#4b5563'; // Blocked သမားဆို မီးခိုးရောင်
            if (days <= 0) return '#ef4444';   // သက်တမ်းကုန် = အနီရောင်
            if (days <= 7) return '#ef4444';   // ၇ ရက်နှင့်အောက် = အနီရောင် (သတိပေးချက်)
            if (days <= 14) return '#eab308';  // ၇ ရက်မှ ၁၄ ရက်ကြား = အဝါရောင်
            if (days <= 30) return '#84cc16';  // ၁၅ ရက်မှ ရက် ၃၀ ကြား = အစိမ်းရင့်/အဝါသန်း
            return '#10b981';                  // ရက် ၃၀ အထက် = အစိမ်းနုရောင်
        }

        function toggleMode() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            document.getElementById('modeIcon').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
        }

        function addFixedDays(days) {
            let d = new Date();
            d.setDate(d.getDate() + days);
            document.getElementById('mDate').value = d.toISOString().split('T')[0];
        }

        function handleLogin() {
            const user = document.getElementById('adminUser').value;
            const pass = document.getElementById('adminPass').value;
            if(user === "AGEVPN" && pass === "1234567") {
                localStorage.setItem("ageLogin", "true");
                checkAuth();
            } else alert("Incorrect Credentials!");
        }

        function handleLogout() {
            localStorage.removeItem("ageLogin");
            location.reload(); 
        }

        function checkAuth() {
            const auth = localStorage.getItem("ageLogin");
            if (auth === "true") {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
            } else {
                document.getElementById('loginSection').style.display = 'flex';
                document.getElementById('mainContent').style.display = 'none';
            }
        }

        function showVoucher(id, name, exp) {
            document.getElementById('vId').innerText = id;
            document.getElementById('vName').innerText = name;
            document.getElementById('vExp').innerText = exp.split('-').reverse().join('/');
            
            const today = new Date();
            today.setHours(0,0,0,0);
            const expiry = new Date(exp);
            expiry.setHours(0,0,0,0);
            
            const diffTime = expiry.getTime() - today.getTime();
            const daysLeft = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            const textEl = document.getElementById('vDaysLeft');
            
            /* Voucher ကတ်ပေါ်တွင်လည်း ရက်အလိုက် ကာလာ ပြောင်းလဲပေးသည် */
            const cardColor = getProgressColor(daysLeft, true);
            
            if (daysLeft <= 0) {
                textEl.innerText = "EXPIRED";
                textEl.style.color = "#ef4444"; 
            } else {
                textEl.innerText = daysLeft + " DAYS";
                textEl.style.color = cardColor; 
            }
            
            document.getElementById('voucherOverlay').style.display = 'flex';
        }

        function handleSaveData() {
            const id = document.getElementById('mId').value.trim(), 
                  name = document.getElementById('mName').value.trim(), 
                  exp = document.getElementById('mDate').value;
            if(!id || !name || !exp) return alert("Fill all!");
            db.collection("users").doc(id).set({ username: name, expiryDate: exp, isActive: true }, { merge: true })
            .then(() => {
                document.getElementById('inputModal').style.display='none';
                showVoucher(id, name, exp);
            });
        }

        function toggleUserStatus(id, currentStatus) {
            db.collection("users").doc(id).update({ isActive: !currentStatus });
        }

        function openDeleteModal(id, username) {
            userIdToDelete = id;
            document.getElementById('deleteTargetName').innerText = username;
            document.getElementById('deleteModal').style.display = 'flex';
        }

        function closeDeleteModal() {
            userIdToDelete = null;
            document.getElementById('deleteModal').style.display = 'none';
        }

        function executeDelete() {
            if(userIdToDelete) {
                db.collection('users').doc(userIdToDelete).delete().then(() => {
                    closeDeleteModal();
                }).catch(err => {
                    alert("Error deleting user: " + err);
                });
            }
        }

        function renderUsers(users) {
            const list = document.getElementById('listContainer');
            list.innerHTML = "";
            
            const today = new Date();
            today.setHours(0,0,0,0);

            users.forEach(u => {
                const expiry = new Date(u.expiryDate);
                expiry.setHours(0,0,0,0);
                
                const diffTime = expiry.getTime() - today.getTime();
                const days = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                
                const isExpired = days <= 0;
                const active = u.isActive !== false;
                
                /* ရက်ကျန်အပေါ် မူတည်ပြီး dynamic ကာလာ ရယူခြင်း */
                const color = getProgressColor(days, active);
                const statusText = active ? (isExpired ? 'Expired' : 'Active') : 'Blocked';
                
                const stroke = 2 * Math.PI * 28; 
                const percent = isExpired ? 0 : Math.min(100, (days / 30) * 100);
                const offset = stroke - (percent / 100) * stroke;

                list.innerHTML += `
                    <div class="user-card" style="border-top: 4px solid ${color}">
                        <div class="status-badge" style="background:${color}20; color:${color}; border: 1px solid ${color}40;">${statusText}</div>
                        
                        <div class="card-top">
                            <div class="progress-circle">
                                <svg>
                                    <circle class="bg" cx="32" cy="32" r="28"/>
                                    <circle class="fg" cx="32" cy="32" r="28" style="stroke-dasharray: ${stroke}; stroke-dashoffset: ${offset}; stroke: ${color};"/>
                                </svg>
                                <div class="percentage" style="color:${color}">${isExpired ? 'EXP' : days + 'D'}</div>
                            </div>
                            <div class="user-info">
                                <span class="user-sub-title">VIP Member</span>
                                <div class="user-name-title">
                                    <i class="fas fa-crown" style="color:var(--gold);"></i>
                                    <span>${u.username}</span>
                                </div>
                            </div>
                        </div>

                        <div class="user-data-wrapper">
                            <div class="data-item">
                                <span class="data-label">Account ID</span>
                                <span class="data-value id">${u.id}</span>
                            </div>
                            <div class="data-item right-align">
                                <span class="data-label">Expiry Date</span>
                                <span class="data-value">${u.expiryDate}</span>
                            </div>
                        </div>

                        <div class="action-group">
                            <button class="act-btn btn-edit" onclick="openInputModal('${u.id}','${u.username}','${u.expiryDate}')"><i class="fas fa-edit" style="color:white;"></i> Edit</button>
                            <button class="act-btn ${active ? 'btn-block' : 'btn-unblock'}" onclick="toggleUserStatus('${u.id}', ${active})"><i class="fas fa-${active ? 'ban' : 'check'}" style="color:white;"></i> ${active ? 'Block' : 'Active'}</button>
                            <button class="act-btn btn-card" onclick="showVoucher('${u.id}','${u.username}','${u.expiryDate}')"><i class="fas fa-id-card" style="color:white;"></i> Card</button>
                            <button class="act-btn btn-delete" onclick="openDeleteModal('${u.id}', '${u.username}')"><i class="fas fa-trash" style="color:white;"></i> Del</button>
                        </div>
                    </div>`;
            });
        }

        function filterUsers() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allUsers.filter(u => u.id.toLowerCase().includes(term) || u.username.toLowerCase().includes(term));
            renderUsers(filtered);
        }

        db.collection("users").onSnapshot(snap => {
            allUsers = []; let t = 0, a = 0;
            const today = new Date();
            today.setHours(0,0,0,0);
            
            snap.forEach(doc => {
                t++; const d = doc.data();
                const expDate = new Date(d.expiryDate);
                expDate.setHours(0,0,0,0);
                if(d.isActive && (expDate >= today)) a++;
                allUsers.push({ id: doc.id, ...d });
            });
            document.getElementById('totalCount').innerText = t;
            document.getElementById('activeCount').innerText = a;
            filterUsers();
        });

        function openInputModal(id='', name='', date='') {
            document.getElementById('mId').value = id;
            document.getElementById('mId').disabled = id !== '';
            document.getElementById('mName').value = name;
            document.getElementById('mDate').value = date;
            document.getElementById('inputModal').style.display = 'flex';
        }

        function downloadVoucher() {
            html2canvas(document.getElementById('voucherPrint'), { scale: 3 }).then(canvas => {
                const link = document.createElement('a');
                link.download = `AGE_VIP_${document.getElementById('vName').innerText}.png`;
                link.href = canvas.toDataURL(); link.click();
            });
        }

        window.onload = checkAuth;
    </script>
</body>
</html>
