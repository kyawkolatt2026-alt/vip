<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGE VIP PREMIUM PANEL | FINAL V3</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

    <style>
        :root {
            --primary: #10b981;
            --warning: #facc15;
            --danger: #ef4444;
            --bg: #060912;
            --card: #111827;
            --card-hover: #1f2937;
            --text: #f9fafb;
            --text-dim: #9ca3af;
            --border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body { 
            background: var(--bg); color: var(--text); min-height: 100vh;
            background-image: radial-gradient(circle at 50% 0%, rgba(16, 185, 129, 0.05) 0%, transparent 50%);
            padding-bottom: 80px;
        }

        /* --- TOAST --- */
        #toastContainer { position: fixed; top: 20px; right: 20px; z-index: 20000; display: flex; flex-direction: column; gap: 10px; }
        .toast {
            padding: 12px 20px; border-radius: 12px; background: var(--card); border-left: 4px solid var(--primary);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); display: flex; align-items: center; gap: 12px;
            transform: translateX(120%); transition: 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        .toast.show { transform: translateX(0); }

        /* --- LOGIN --- */
        #loginSection { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; background: var(--bg); z-index: 10000; padding: 20px; }
        .login-box { background: var(--card); padding: 3rem 2rem; border-radius: 2.5rem; width: 100%; max-width: 400px; text-align: center; border: 1px solid var(--border); }

        /* --- HEADER --- */
        .header { padding: 3rem 1.5rem 5rem; text-align: center; position: relative; }
        .nav { position: absolute; top: 1.5rem; right: 1.5rem; display: flex; gap: 10px; }
        .nav-btn {
            background: var(--card); border: 1px solid var(--border); color: var(--text);
            width: 44px; height: 44px; border-radius: 12px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }

        .header h1 { font-family: 'Space Grotesk', sans-serif; font-size: 2.5rem; font-weight: 800; }
        .header h1 span { color: var(--primary); }

        /* --- STAT CARDS --- */
        .stats { 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; 
            max-width: 800px; margin: 2rem auto 0; padding: 0 15px;
        }
        @media (max-width: 600px) {
            .stats { grid-template-columns: repeat(3, 1fr); gap: 8px; }
            .stat-card { padding: 1rem 0.5rem; }
            .stat-card h2 { font-size: 1.5rem; }
            .stat-card p { font-size: 0.55rem; }
        }
        .stat-card { background: var(--card); border: 1px solid var(--border); padding: 1.5rem; border-radius: 1.5rem; text-align: center; }
        .stat-card h2 { font-size: 2rem; font-weight: 800; color: var(--primary); }
        .stat-card p { font-size: 0.65rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; margin-top: 4px; }
        .stat-card.warning h2 { color: var(--warning); }

        /* --- SEARCH --- */
        .search-wrap { max-width: 600px; margin: -2rem auto 0; padding: 0 1.5rem; position: relative; z-index: 10; }
        .search-bar {
            width: 100%; background: var(--card); border: 1px solid var(--border);
            padding: 1.25rem 1.25rem 1.25rem 3.5rem; border-radius: 1.25rem;
            color: var(--text); font-size: 1rem; font-weight: 600; outline: none;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
        }

        /* --- RESPONSIVE GRID --- */
        .grid {
            max-width: 1400px; margin: 3.5rem auto; padding: 0 15px;
            display: grid; gap: 15px; grid-template-columns: 1fr; 
        }
        @media (min-width: 600px) { .grid { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1024px) { .grid { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 1400px) { .grid { grid-template-columns: repeat(4, 1fr); } }

        /* --- CARD --- */
        .card {
            background: var(--card); border: 1px solid var(--border); border-radius: 1.5rem;
            padding: 1.25rem; position: relative; display: flex; flex-direction: column;
            gap: 1.25rem; transition: 0.3s; overflow: hidden;
        }
        .card:hover { transform: translateY(-5px); border-color: var(--primary); }

        .badge {
            position: absolute; top: 1rem; right: 1rem; padding: 4px 10px; border-radius: 8px;
            font-size: 0.6rem; font-weight: 800; text-transform: uppercase; z-index: 5;
        }

        .card-head { display: flex; align-items: center; gap: 1rem; padding-right: 60px; }
        .avatar {
            width: 44px; height: 44px; border-radius: 12px; flex-shrink: 0;
            background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
        }

        .user-meta { min-width: 0; flex: 1; }
        .user-meta h3 { font-size: 1rem; font-weight: 700; line-height: 1.2; margin-bottom: 2px; }
        .user-meta p { font-size: 0.7rem; color: var(--text-dim); }

        .expiry-box { width: 100%; }
        .expiry-info { display: flex; justify-content: space-between; font-size: 0.65rem; font-weight: 700; margin-bottom: 6px; }
        .bar-bg { width: 100%; height: 6px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; }
        .bar-fill { height: 100%; border-radius: 10px; transition: width 0.5s ease; }

        .details { display: flex; flex-direction: column; gap: 8px; padding: 12px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
        .detail-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .detail-row label { font-size: 0.6rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; flex-shrink: 0; }
        .detail-row span { font-size: 0.8rem; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .actions { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .btn {
            height: 38px; border-radius: 10px; border: none; cursor: pointer;
            color: white; font-size: 1rem; display: flex; align-items: center; justify-content: center;
        }
        .btn:hover { filter: brightness(1.2); }
        .bg-blue { background: #3b82f6; }
        .bg-red { background: #ef4444; }
        .bg-green { background: #10b981; }
        .bg-amber { background: #f59e0b; }
        .bg-slate { background: #4b5563; }

        /* --- COMPACT MODAL UI --- */
        .overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px); z-index: 15000; align-items: center; justify-content: center; padding: 20px;
        }
        .modal { 
            background: var(--card); border: 1px solid var(--border); padding: 1.5rem; border-radius: 1.5rem; 
            width: 100%; max-width: 400px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        .modal h3 { font-size: 1.3rem; font-weight: 800; margin-bottom: 1.2rem; color: var(--primary); text-align: center; }
        
        .form-group { margin-bottom: 0.8rem; }
        .form-group label { display: block; font-size: 0.65rem; font-weight: 800; color: var(--text-dim); text-transform: uppercase; margin-bottom: 4px; }
        
        .input-styled { 
            width: 100%; background: #0c1221; border: 1px solid var(--border); padding: 0.8rem; 
            border-radius: 10px; color: var(--text); outline: none; font-weight: 600; font-size: 0.9rem;
        }
        
        .primary-btn { 
            width: 100%; padding: 0.9rem; background: var(--primary); border: none; 
            border-radius: 10px; color: white; font-weight: 800; cursor: pointer; font-size: 1rem;
        }

        .quick-days { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 1rem; }
        .q-btn { 
            padding: 0.6rem; border-radius: 8px; border: 1px solid var(--border); 
            background: #0c1221; color: white; cursor: pointer; font-size: 0.7rem; font-weight: 700;
        }

        /* --- FAB --- */
        .fab {
            position: fixed; bottom: 2rem; right: 2rem; width: 60px; height: 60px;
            background: var(--primary); border-radius: 18px; border: none; color: white;
            font-size: 1.4rem; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 100;
        }

        #empty { display: none; text-align: center; padding: 4rem; color: var(--text-dim); }
    </style>
</head>
<body>

    <div id="toastContainer"></div>

    <!-- LOGIN -->
    <div id="loginSection">
        <div class="login-box">
            <i class="fas fa-shield-halved" style="font-size: 3rem; color: var(--primary); margin-bottom: 1rem;"></i>
            <h2>ADMIN LOGIN</h2>
            <input type="text" id="adminUser" class="input-styled" style="margin-bottom:0.8rem;" placeholder="Username">
            <input type="password" id="adminPass" class="input-styled" style="margin-bottom:1.2rem;" placeholder="Password">
            <button class="primary-btn" id="loginBtn" onclick="handleLogin()">SIGN IN</button>
        </div>
    </div>

    <!-- MAIN -->
    <div id="mainContent" style="display: none;">
        <div class="header">
            <div class="nav">
                <button class="nav-btn" onclick="exportCSV()"><i class="fas fa-file-export"></i></button>
                <button class="nav-btn" onclick="openSettings()"><i class="fas fa-cog"></i></button>
                <button class="nav-btn" onclick="handleLogout()"><i class="fas fa-power-off"></i></button>
            </div>
            <h1>AGE <span>VIP</span> PANEL</h1>
            <div class="stats">
                <div class="stat-card"> <h2 id="totalCount">0</h2> <p>Total</p> </div>
                <div class="stat-card"> <h2 id="activeCount">0</h2> <p>Active</p> </div>
                <div class="stat-card warning"> <h2 id="expiringCount">0</h2> <p>Expiring</p> </div>
            </div>
        </div>

        <div class="search-wrap">
            <input type="text" id="searchInput" class="search-bar" placeholder="Search ID or Name..." onkeyup="filterUsers()">
        </div>

        <div id="empty"><i class="fas fa-user-slash" style="font-size:3rem; margin-bottom:1rem; opacity:0.3;"></i><p>No members found</p></div>
        <div class="grid" id="listContainer"></div>
        
        <button class="fab" onclick="openInputModal()"><i class="fas fa-plus"></i></button>
    </div>

    <!-- REGISTER/EDIT MODAL -->
    <div class="overlay" id="inputModal">
        <div class="modal">
            <h3 id="modalTitle">Register VIP</h3>
            
            <div class="form-group">
                <label>Account ID</label>
                <input type="text" id="mId" class="input-styled" placeholder="Enter ID">
            </div>

            <div class="form-group">
                <label>Customer Name</label>
                <input type="text" id="mName" class="input-styled" placeholder="Enter Name">
            </div>

            <div class="form-group">
                <label>Quick Duration</label>
                <div class="quick-days">
                    <button class="q-btn" onclick="addFixedDays(30)">30 Days</button>
                    <button class="q-btn" onclick="addFixedDays(60)">60 Days</button>
                    <button class="q-btn" onclick="addFixedDays(360)">1 Year</button>
                </div>
            </div>

            <div class="form-group">
                <label>Expiry Date</label>
                <input type="date" id="mDate" class="input-styled">
            </div>

            <button class="primary-btn" onclick="handleSaveData()">ACTIVATE VIP</button>
            <button class="primary-btn" style="background:transparent; color:var(--text-dim); margin-top:8px;" onclick="document.getElementById('inputModal').style.display='none'">CANCEL</button>
        </div>
    </div>

    <!-- DELETE MODAL -->
    <div class="overlay" id="deleteModal">
        <div class="modal" style="text-align:center;">
            <i class="fas fa-trash-can" style="font-size: 2rem; color: var(--danger); margin-bottom: 1rem;"></i>
            <h3>Delete User?</h3>
            <p style="margin-bottom:1.2rem; opacity:0.7; font-size: 0.9rem;">Delete <b id="deleteTargetName" style="color:white;"></b>?</p>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <button class="primary-btn" style="background:var(--danger);" onclick="executeDelete()">YES</button>
                <button class="primary-btn" style="background:var(--slate);" onclick="closeDeleteModal()">NO</button>
            </div>
        </div>
    </div>

    <div class="overlay" id="voucherOverlay">
        <div style="display:flex; flex-direction:column; align-items:center;">
            <div id="voucherPrint" style="width: 350px; height: 200px; background: linear-gradient(135deg, #064e3b 0%, #022c22 100%); border-radius: 1.5rem; padding: 1.5rem; border: 1px solid rgba(16, 185, 129, 0.3); color: white; position: relative; overflow: hidden;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div style="font-weight:900; color:var(--warning); font-size:1.2rem;"><i class="fas fa-crown"></i> AGE VIP</div>
                    <div id="vDaysLeft" style="font-size:0.8rem; background:rgba(255,255,255,0.1); padding:4px 10px; border-radius:8px;">30 DAYS</div>
                </div>
                <div id="vId" style="font-family:monospace; font-size:1.4rem; font-weight:700; margin-top:1.5rem;">0000 0000 0000</div>
                <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-top:2rem;">
                    <div><p style="font-size:0.6rem; opacity:0.6; text-transform:uppercase;">Member</p><p id="vName" style="font-weight:800; text-transform:uppercase;">NAME</p></div>
                    <div style="text-align:right;"><p style="font-size:0.6rem; opacity:0.6; text-transform:uppercase;">Expires</p><p id="vExp" style="font-family:monospace; font-size:0.8rem;">00/00/0000</p></div>
                </div>
            </div>
            <button class="primary-btn" style="width:350px; margin-top:20px; background:var(--warning); color:black;" onclick="downloadVoucher()">DOWNLOAD CARD</button>
            <button onclick="document.getElementById('voucherOverlay').style.display='none'" style="margin-top:15px; background:none; border:none; color:var(--text-dim); cursor:pointer;">CLOSE</button>
        </div>
    </div>

    <div class="overlay" id="settingsModal">
        <div class="modal">
            <h3>Admin Settings</h3>
            <input type="text" id="newAdminUser" class="input-styled" placeholder="New Username">
            <input type="password" id="newAdminPass" class="input-styled" placeholder="New Password">
            <input type="password" id="confirmAdminPass" class="input-styled" placeholder="Confirm Password">
            <button class="primary-btn" id="saveSettingsBtn" onclick="handleSaveSettings()">SAVE</button>
            <button class="primary-btn" style="background:transparent; color:var(--text-dim); margin-top:8px;" onclick="document.getElementById('settingsModal').style.display='none'">CANCEL</button>
        </div>
    </div>

    <script>
        // --- LOGIC ---
        const firebaseConfig = {
            apiKey: "AIzaSyB3cFSVLfpvHPeD732r-iL4Yfhi0wHEuOA",
            authDomain: "vipsystem-c301c.firebaseapp.com",
            projectId: "vipsystem-c301c",
            storageBucket: "vipsystem-c301c.firebasestorage.app",
            messagingSenderId: "386611318116",
            appId: "1:386611318116:android:6c19b4f20876ac4aba7e71"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let allUsers = [];
        let userIdToDelete = null;
        const ADMIN_DOC_ID = "---ADMIN_CREDENTIALS---";

        function showToast(msg) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<i class="fas fa-circle-check"></i> <span>${msg}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 100);
            setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 400); }, 3000);
        }

        function copy(text) { navigator.clipboard.writeText(text).then(() => showToast("ID Copied!")); }

        function exportCSV() {
            let csv = "ID,Name,Expiry,Status\n";
            allUsers.forEach(u => { if(u.id !== ADMIN_DOC_ID) csv += `${u.id},${u.username},${u.expiryDate},${u.isActive ? 'Active' : 'Blocked'}\n`; });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = 'AGE_VIP_Users.csv'; a.click();
        }

        function getStatus(days, isActive) {
            if (!isActive || days <= 0) return { color: '#ef4444', label: days <= 0 ? 'Expired' : 'Blocked', sort: 3 };
            if (days <= 7) return { color: '#facc15', label: 'Expiring', sort: 1 };
            return { color: '#10b981', label: 'Active', sort: 2 };
        }

        function addFixedDays(days) {
            let d = new Date(); d.setDate(d.getDate() + days);
            document.getElementById('mDate').value = d.toISOString().split('T')[0];
        }

        async function handleLogin() {
            const user = document.getElementById('adminUser').value.trim();
            const pass = document.getElementById('adminPass').value.trim();
            if(!user || !pass) return alert("Enter credentials");
            try {
                const doc = await db.collection("users").doc(ADMIN_DOC_ID).get();
                let sU = "AGEVPN", sP = "1234567";
                if (doc.exists) { sU = doc.data().u; sP = doc.data().p; }
                if(user === sU && pass === sP) {
                    localStorage.setItem("ageLogin", "true"); checkAuth();
                } else { alert("Wrong credentials"); }
            } catch (e) { alert(e.message); }
        }

        function handleLogout() { localStorage.removeItem("ageLogin"); location.reload(); }

        function checkAuth() {
            const auth = localStorage.getItem("ageLogin");
            if (auth === "true") {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
            } else {
                document.getElementById('loginSection').style.display = 'flex';
                document.getElementById('mainContent').style.display = 'none';
            }
        }

        function showVoucher(id, name, exp) {
            document.getElementById('vId').innerText = id;
            document.getElementById('vName').innerText = name;
            document.getElementById('vExp').innerText = exp.split('-').reverse().join('/');
            const today = new Date(); today.setHours(0,0,0,0);
            const expiry = new Date(exp); expiry.setHours(0,0,0,0);
            const daysLeft = Math.ceil((expiry.getTime() - today.getTime()) / (1000 * 60 * 60 * 24));
            const textEl = document.getElementById('vDaysLeft');
            if (daysLeft <= 0) { textEl.innerText = "EXPIRED"; textEl.style.color = "#ef4444"; }
            else { textEl.innerText = daysLeft + " DAYS"; textEl.style.color = "#facc15"; }
            document.getElementById('voucherOverlay').style.display = 'flex';
        }

        function handleSaveData() {
            const id = document.getElementById('mId').value.trim(), name = document.getElementById('mName').value.trim(), date = document.getElementById('mDate').value;
            if(!id || !name || !date) return alert("Missing data");
            db.collection("users").doc(id).set({ username: name, expiryDate: date, isActive: true }).then(() => {
                showToast("Success!"); document.getElementById('inputModal').style.display = 'none';
            });
        }

        function renderUsers(users) {
            const container = document.getElementById('listContainer');
            const empty = document.getElementById('empty');
            container.innerHTML = "";
            const today = new Date(); today.setHours(0,0,0,0);

            if(users.length === 0) { empty.style.display = 'block'; return; }
            else { empty.style.display = 'none'; }

            // SMART SORTING: Expiring Soon > Active > Expired
            users.sort((a, b) => {
                const aExp = new Date(a.expiryDate); aExp.setHours(0,0,0,0);
                const bExp = new Date(b.expiryDate); bExp.setHours(0,0,0,0);
                const aDays = Math.ceil((aExp.getTime() - today.getTime()) / (1000 * 60 * 60 * 24));
                const bDays = Math.ceil((bExp.getTime() - today.getTime()) / (1000 * 60 * 60 * 24));
                const aStatus = getStatus(aDays, a.isActive);
                const bStatus = getStatus(bDays, b.isActive);
                
                if (aStatus.sort !== bStatus.sort) return aStatus.sort - bStatus.sort;
                return aExp - bExp; // Within same group, sort by date
            });

            users.forEach(u => {
                if (u.id === ADMIN_DOC_ID) return;
                const expDate = new Date(u.expiryDate); expDate.setHours(0,0,0,0);
                const daysLeft = Math.ceil((expDate.getTime() - today.getTime()) / (1000 * 60 * 60 * 24));
                const status = getStatus(daysLeft, u.isActive);
                const progress = Math.min(100, Math.max(0, (daysLeft / 30) * 100));

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="badge" style="background: ${status.color}20; color: ${status.color}; border: 1px solid ${status.color}40;">
                        ${status.label}
                    </div>
                    <div class="card-head">
                        <div class="avatar" style="color: ${status.color};"><i class="fas fa-shield-halved"></i></div>
                        <div class="user-meta">
                            <h3>${u.username}</h3>
                            <p>VIP Member</p>
                        </div>
                    </div>

                    <div class="expiry-box">
                        <div class="expiry-info">
                            <span>Remaining</span>
                            <span style="color:${status.color}">${daysLeft <= 0 ? 'Expired' : daysLeft + ' days'}</span>
                        </div>
                        <div class="bar-bg">
                            <div class="bar-fill" style="width: ${progress}%; background: ${status.color};"></div>
                        </div>
                    </div>

                    <div class="details">
                        <div class="detail-row"><label>ID</label><div style="display:flex; align-items:center; gap:5px; min-width:0;"><span style="color:var(--primary); font-family:monospace;">${u.id}</span><i class="fas fa-copy" style="font-size:0.7rem; cursor:pointer; opacity:0.5;" onclick="copy('${u.id}')"></i></div></div>
                        <div class="detail-row"><label>Exp</label><span style="color:${status.color}">${u.expiryDate.split('-').reverse().join('/')}</span></div>
                    </div>
                    <div class="actions">
                        <button class="btn bg-blue" onclick="openInputModal('${u.id}', '${u.username}', '${u.expiryDate}')"><i class="fas fa-edit"></i></button>
                        <button class="btn ${u.isActive ? 'bg-red' : 'bg-green'}" onclick="toggleStatus('${u.id}', ${u.isActive})"><i class="fas fa-${u.isActive ? 'ban' : 'check'}"></i></button>
                        <button class="btn bg-amber" onclick="showVoucher('${u.id}', '${u.username}', '${u.expiryDate}')"><i class="fas fa-id-card"></i></button>
                        <button class="btn bg-slate" onclick="confirmDelete('${u.id}', '${u.username}')"><i class="fas fa-trash"></i></button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function toggleStatus(id, currentStatus) { db.collection("users").doc(id).update({ isActive: !currentStatus }); }
        function confirmDelete(id, name) { userIdToDelete = id; document.getElementById('deleteTargetName').innerText = name; document.getElementById('deleteModal').style.display = 'flex'; }
        function closeDeleteModal() { document.getElementById('deleteModal').style.display = 'none'; userIdToDelete = null; }
        function executeDelete() { if (userIdToDelete) { db.collection("users").doc(userIdToDelete).delete().then(() => { closeDeleteModal(); showToast("Deleted"); }); } }
        function filterUsers() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allUsers.filter(u => u.id.toLowerCase().includes(term) || (u.username && u.username.toLowerCase().includes(term)));
            renderUsers(filtered);
        }

        db.collection("users").onSnapshot(snap => {
            allUsers = []; let t = 0, a = 0, e = 0;
            const today = new Date(); today.setHours(0,0,0,0);
            snap.forEach(doc => {
                const d = doc.data(); if (doc.id === ADMIN_DOC_ID) return;
                t++; const expDate = new Date(d.expiryDate); expDate.setHours(0,0,0,0);
                const daysLeft = Math.ceil((expDate.getTime() - today.getTime()) / (1000 * 60 * 60 * 24));
                if(d.isActive && (expDate >= today)) a++;
                if(d.isActive && daysLeft > 0 && daysLeft <= 7) e++;
                allUsers.push({ id: doc.id, ...d });
            });
            document.getElementById('totalCount').innerText = t;
            document.getElementById('activeCount').innerText = a;
            document.getElementById('expiringCount').innerText = e;
            filterUsers();
        });

        function openInputModal(id='', name='', date='') {
            document.getElementById('modalTitle').innerText = id ? 'Edit VIP' : 'Register VIP';
            document.getElementById('mId').value = id; document.getElementById('mId').disabled = id !== '';
            document.getElementById('mName').value = name; document.getElementById('mDate').value = date;
            document.getElementById('inputModal').style.display = 'flex';
        }

        function openSettings() { document.getElementById('settingsModal').style.display = 'flex'; }

        function downloadVoucher() {
            html2canvas(document.getElementById('voucherPrint'), { scale: 3, backgroundColor: null, useCORS: true }).then(canvas => {
                const link = document.createElement('a'); link.download = `AGE_VIP_${document.getElementById('vName').innerText}.png`;
                link.href = canvas.toDataURL('image/png'); link.click();
            });
        }
        window.onload = checkAuth;
    </script>
</body>
</html>
